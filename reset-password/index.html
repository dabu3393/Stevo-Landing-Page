<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stevo - Reset Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F0F1A;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(0,196,140,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    p {
      color: #8B8B9E;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: #00C48C;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      padding: 16px 48px;
      border-radius: 14px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .fallback {
      margin-top: 20px;
      color: #8B8B9E;
      font-size: 13px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00C48C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h1>Opening Stevo...</h1>
    <p>You'll be redirected to the app to set your new password.</p>
  </div>

  <script>
    (function () {
      // Supabase puts tokens in the URL hash: #access_token=...&refresh_token=...&type=recovery
      var hash = window.location.hash.substring(1);
      if (!hash) {
        // Try query string as fallback
        hash = window.location.search.substring(1);
      }

      if (!hash) {
        document.getElementById('card').innerHTML =
          '<div class="icon">&#9888;</div>' +
          '<h1>Invalid Link</h1>' +
          '<p>This reset link is expired or invalid. Please request a new one from the app.</p>';
        return;
      }

      // Build the deep link
      var appUrl = 'stevo://reset-password#' + hash;

      // Try to open the app immediately
      window.location.href = appUrl;

      // After a delay, show a manual button in case auto-redirect didn't work
      setTimeout(function () {
        document.getElementById('card').innerHTML =
          '<div class="icon">&#128274;</div>' +
          '<h1>Reset Your Password</h1>' +
          '<p>Tap the button below to open Stevo and set your new password.</p>' +
          '<a class="btn" href="' + appUrl + '">Open Stevo</a>' +
          '<p class="fallback">If the app doesn\'t open, make sure Stevo is installed.</p>';
      }, 2500);
    })();
  </script>
</body>
</html>
